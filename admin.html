<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Admin · Image to Video Generation</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    --bg: #0a0a0c;
    --panel: #14141a;
    --border: #2a2a32;
    --text: #e8e8ec;
    --muted: #9a9aa6;
    --accent: #9fd3ff;
    --warn: #f4b860;
    --err: #ff6b6b;
    --ok: #7ce4a0;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
    padding: 24px;
  }
  header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 18px;
  }
  header img { height: 42px; background: #fff; padding: 4px 8px; border-radius: 4px; }
  header h1 { margin: 0; font-weight: 300; letter-spacing: 0.05em; font-size: 20px; }
  header h1 span { color: var(--accent); }
  a.back { color: var(--accent); text-decoration: none; font-size: 13px; }

  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px;
    margin-bottom: 16px;
  }
  .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  label { color: var(--muted); font-size: 12px; }
  input[type="text"], input[type="password"], input[type="url"] {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 13px;
    min-width: 280px;
  }
  textarea {
    width: 100%;
    min-height: 60vh;
    background: #0d0d11;
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    font-family: ui-monospace, "SF Mono", Menlo, Monaco, Consolas, monospace;
    font-size: 12.5px;
    line-height: 1.55;
    resize: vertical;
  }
  .btn {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 14px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
  }
  .btn:hover { border-color: #555; }
  .btn.primary { border-color: var(--accent); color: var(--accent); }
  .btn.primary:hover { background: rgba(159,211,255,0.08); }
  .hint { color: var(--muted); font-size: 12px; margin-top: 8px; line-height: 1.5; }
  #msg { font-size: 13px; min-height: 18px; }
  #msg.ok { color: var(--ok); }
  #msg.err { color: var(--err); }
  #msg.warn { color: var(--warn); }
  .count { color: var(--muted); font-size: 12px; margin-left: auto; }
</style>
</head>
<body>

<header>
  <img src="bhs_logo.jpg" alt="BHS">
  <div>
    <h1>ADMIN <span>·</span> Prompt Editor</h1>
    <a class="back" href="showcase.html">← back to showcase</a>
  </div>
</header>

<div class="card">
  <div class="row">
    <label for="api-base">API base</label>
    <input id="api-base" type="url" placeholder="(blank = same origin) e.g. https://your-api-host">
    <label for="token">Admin token</label>
    <input id="token" type="password" placeholder="X-Admin-Token (set on server)">
    <button class="btn" id="load-btn">Load prompts</button>
    <button class="btn primary" id="save-btn">Save prompts</button>
    <span id="msg"></span>
  </div>
  <div class="hint">
    The pipeline cycles through these prompts (one per image, in order, modulo the list length).
    One prompt per block, separated by a blank line. Blank lines are preserved as separators only.
  </div>
</div>

<div class="card">
  <div class="row" style="margin-bottom:8px;">
    <label>Prompts</label>
    <span class="count" id="count">0 prompts</span>
  </div>
  <textarea id="prompts" spellcheck="false"
    placeholder="Paste / edit prompts here.&#10;Separate each prompt with a blank line."></textarea>
</div>

<script>
  const API_BASE_KEY = "lensing.apiBase";
  const TOKEN_KEY = "lensing.adminToken";

  const apiBaseEl = document.getElementById("api-base");
  const tokenEl = document.getElementById("token");
  const promptsEl = document.getElementById("prompts");
  const msgEl = document.getElementById("msg");
  const countEl = document.getElementById("count");
  const loadBtn = document.getElementById("load-btn");
  const saveBtn = document.getElementById("save-btn");

  apiBaseEl.value = localStorage.getItem(API_BASE_KEY) || "";
  tokenEl.value = localStorage.getItem(TOKEN_KEY) || "";

  apiBaseEl.addEventListener("input", () => localStorage.setItem(API_BASE_KEY, apiBaseEl.value.trim()));
  tokenEl.addEventListener("input",   () => localStorage.setItem(TOKEN_KEY, tokenEl.value.trim()));

  function apiBase() { return (apiBaseEl.value || "").trim().replace(/\/$/, ""); }
  function authHeaders() {
    const t = (tokenEl.value || "").trim();
    return t ? { "X-Admin-Token": t } : {};
  }

  function setMsg(text, kind) {
    msgEl.textContent = text;
    msgEl.className = kind || "";
  }

  function promptsToText(arr) {
    return arr.join("\n\n");
  }
  function textToPrompts(text) {
    return text.split(/\n\s*\n+/).map(s => s.trim()).filter(Boolean);
  }
  function updateCount() {
    const n = textToPrompts(promptsEl.value).length;
    countEl.textContent = `${n} prompt${n === 1 ? "" : "s"}`;
  }
  promptsEl.addEventListener("input", updateCount);

  async function loadPrompts() {
    setMsg("Loading…", "");
    try {
      const r = await fetch(`${apiBase()}/api/prompts`, { headers: authHeaders() });
      if (r.status === 401) { setMsg("Unauthorized — check the admin token.", "err"); return; }
      if (!r.ok) { setMsg(`Load failed: ${r.status}`, "err"); return; }
      const data = await r.json();
      promptsEl.value = promptsToText(data.prompts || []);
      updateCount();
      setMsg(data.auth_required ? `Loaded ${data.prompts.length} prompts.` : `Loaded ${data.prompts.length} prompts (server has no token configured).`,
             data.auth_required ? "ok" : "warn");
    } catch (e) {
      setMsg("Error: " + e.message, "err");
    }
  }

  async function savePrompts() {
    const prompts = textToPrompts(promptsEl.value);
    if (prompts.length === 0) { setMsg("Need at least one prompt.", "err"); return; }
    setMsg("Saving…", "");
    try {
      const r = await fetch(`${apiBase()}/api/prompts`, {
        method: "POST",
        headers: { "Content-Type": "application/json", ...authHeaders() },
        body: JSON.stringify({ prompts }),
      });
      if (r.status === 401) { setMsg("Unauthorized — check the admin token.", "err"); return; }
      const data = await r.json().catch(() => ({}));
      if (!r.ok) { setMsg(`Save failed: ${data.error || r.status}`, "err"); return; }
      setMsg(`Saved ${data.saved} prompts.`, "ok");
    } catch (e) {
      setMsg("Error: " + e.message, "err");
    }
  }

  loadBtn.addEventListener("click", loadPrompts);
  saveBtn.addEventListener("click", savePrompts);

  // Auto-load on first visit if a token (or no auth) is configured.
  loadPrompts();
</script>

</body>
</html>
